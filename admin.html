<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MUDU TECH | Yönetici Paneli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">
  <style>
    .admin-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 2rem;
      background: rgba(255,255,255,0.02);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .tab-btn {
      background: rgba(255,255,255,0.05);
      border: none;
      color: var(--text-main);
      padding: 0.8rem 1.5rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .tab-btn.active {
      background: var(--accent-orange);
      color: #fff;
    }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .data-table th, .data-table td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .data-table th {
      color: var(--accent-orange);
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.8rem;
    }
    .data-table tr:hover {
      background: rgba(255,255,255,0.02);
    }
    #login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-dark);
      z-index: 1000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .login-box {
      background: var(--card-bg);
      padding: 3rem;
      border-radius: 16px;
      border: 1px solid var(--accent-orange);
      text-align: center;
      width: 100%;
      max-width: 400px;
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <h2>Yönetici Girişi</h2>
      <p style="margin-bottom: 2rem;">Lütfen giriş yapın.</p>
      <div class="input-group" style="text-align: left;">
        <label>Admin Şifresi</label>
        <input type="password" id="admin-pass" placeholder="Şifrenizi girin">
      </div>
      <button class="btn-filled" style="width: 100%;" id="login-btn">Giriş Yap</button>
      <p id="login-error" style="color: red; margin-top: 1rem; font-size: 0.8rem;"></p>
    </div>
  </div>

  <div class="admin-container" id="admin-content" style="display: none;">
    <header class="admin-header">
      <h1>MUDU TECH Admin</h1>
      <a href="index.html" style="color: var(--text-main); text-decoration: none;">&larr; Siteye Dön</a>
    </header>

    <div class="tabs">
      <button class="tab-btn active" data-tab="registrations">Etkinlik Kayıtları</button>
      <button class="tab-btn" data-tab="speakers">Konuşmacı Yönetimi</button>
      <button class="tab-btn" data-tab="program">Program Yönetimi</button>
      <button class="tab-btn" data-tab="sponsors">Sponsor Yönetimi</button>
      <button class="tab-btn" data-tab="workshops">Atölye Yönetimi</button>
      <button class="tab-btn" data-tab="team">Ekip Yönetimi</button>
    </div>

    <!-- Team Form -->
    <div id="team-form-container" class="form-panel" style="display: none;">
      <h3 style="margin-bottom: 1.5rem; color: #fff;">Yeni Ekip Üyesi Ekle</h3>
      <form id="add-team-form">
        <div class="form-grid">
          <div class="input-group">
            <label>Ad Soyad</label>
            <input type="text" id="tm-name" required>
          </div>
          <div class="input-group">
            <label>Kurum / Görev</label>
            <input type="text" id="tm-institution" required placeholder="Örn: MUDU Üni. Öğrencisi">
          </div>
          <div class="input-group">
             <label>Fotoğraf Seç</label>
             <input type="file" id="tm-image" accept="image/*">
          </div>
          <div class="input-group">
            <label>Veya Fotoğraf URL</label>
            <input type="text" id="tm-image-url">
          </div>
        </div>
        <button type="submit" class="btn-filled">Kaydet</button>
        <div id="tm-message" class="message"></div>
      </form>
    </div>

    <!-- Stats & Filters Container -->
    <div id="stats-filter-container" style="margin-bottom: 2rem;">
       <div id="admin-stats" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem;">
          <!-- Stats will be injected here -->
       </div>
       <div class="search-box" style="margin-bottom: 1rem;">
          <input type="text" id="admin-search" placeholder="İsim, e-posta veya okul/şirket ile ara..." style="width: 100%; padding: 1rem; border-radius: 8px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;">
       </div>
    </div>

    <!-- Speaker Form -->
    <div id="speaker-form-container" class="form-panel" style="display: none;">
      <h3 style="margin-bottom: 1.5rem; color: #fff;">Yeni Konuşmacı Ekle</h3>
      <form id="add-speaker-form">
        <div class="form-grid">
          <div class="input-group">
            <label>Ad Soyad</label>
            <input type="text" id="sp-name" required>
          </div>
          <div class="input-group">
            <label>Ünvan</label>
            <input type="text" id="sp-title" required>
          </div>
          <div class="input-group">
            <label>Şirket</label>
            <input type="text" id="sp-company" required>
          </div>
          <div class="input-group">
            <label>LinkedIn URL</label>
            <input type="url" id="sp-linkedin">
          </div>
          <div class="input-group">
             <label>Fotoğraf Seç</label>
             <input type="file" id="sp-image" accept="image/*">
          </div>
          <div class="input-group">
            <label>Veya URL</label>
            <input type="text" id="sp-image-url">
          </div>
        </div>
        <button type="submit" class="btn-filled">Kaydet</button>
        <div id="sp-message" class="message"></div>
      </form>
    </div>

    <!-- Program Form -->
    <div id="program-form-container" class="form-panel" style="display: none;">
      <h3 style="margin-bottom: 1.5rem; color: #fff;">Yeni Program Akışı Ekle</h3>
      <form id="add-program-form">
        <div class="form-grid">
          <div class="input-group">
            <label>Gün Seç</label>
            <select id="pg-day" required>
              <option value="day1">14 Mayıs (1. Gün)</option>
              <option value="day2">15 Mayıs (2. Gün)</option>
            </select>
          </div>
          <div class="input-group">
            <label>Saat</label>
            <input type="text" id="pg-time" placeholder="Örn: 10:00" required>
          </div>
          <div class="input-group">
            <label>Başlık</label>
            <input type="text" id="pg-title" required>
          </div>
          <div class="input-group">
            <label>Etiket</label>
            <input type="text" id="pg-tag" placeholder="Örn: Workshop">
          </div>
          <div class="input-group" style="grid-column: span 2;">
            <label>Açıklama</label>
            <textarea id="pg-desc" rows="2"></textarea>
          </div>
          <div class="input-group">
             <label>Afiş/Poster Seç</label>
             <input type="file" id="pg-image" accept="image/*">
          </div>
          <div class="input-group">
            <label>Veya URL</label>
            <input type="text" id="pg-image-url">
          </div>
        </div>
        <button type="submit" class="btn-filled">Kaydet</button>
        <div id="pg-message" class="message"></div>
      </form>
    </div>

    <!-- Sponsor Form -->
    <div id="sponsor-form-container" class="form-panel" style="display: none;">
      <h3 style="margin-bottom: 1.5rem; color: #fff;">Yeni Sponsor Ekle</h3>
      <form id="add-sponsor-form">
        <div class="form-grid">
          <div class="input-group">
            <label>Sponsor Adı</label>
            <input type="text" id="sn-name" required>
          </div>
          <div class="input-group">
            <label>Kategori (Tier)</label>
            <select id="sn-tier" required>
              <option value="Platin">Platin</option>
              <option value="Altın">Altın</option>
              <option value="Gümüş">Gümüş</option>
              <option value="Katılımcı">Katılımcı Firma</option>
            </select>
          </div>
          <div class="input-group">
             <label>Logo Seç</label>
             <input type="file" id="sn-logo" accept="image/*">
          </div>
          <div class="input-group">
            <label>Veya Logo URL</label>
            <input type="text" id="sn-logo-url">
          </div>
        </div>
        <button type="submit" class="btn-filled">Kaydet</button>
        <div id="sn-message" class="message"></div>
      </form>
    </div>
    <!-- Workshop Form -->
    <div id="workshop-form-container" class="form-panel" style="display: none;">
      <h3 style="margin-bottom: 1.5rem; color: #fff;">Yeni Atölye Ekle</h3>
      <form id="add-workshop-form">
        <div class="form-grid">
          <div class="input-group">
            <label>Atölye Başlığı</label>
            <input type="text" id="ws-title" required>
          </div>
          <div class="input-group">
            <label>Eğitici/Konuşmacı</label>
            <input type="text" id="ws-instructor" required>
          </div>
          <div class="input-group">
            <label>Tarih ve Saat</label>
            <input type="text" id="ws-datetime" placeholder="Örn: 14 Mayıs, 14:00" required>
          </div>
          <div class="input-group">
            <label>Konum</label>
            <input type="text" id="ws-location" placeholder="Örn: Lab A" required>
          </div>
          <div class="input-group" style="grid-column: span 2;">
            <label>Açıklama</label>
            <textarea id="ws-desc" rows="2"></textarea>
          </div>
          <div class="input-group">
             <label>Dosyadan Afiş Seç</label>
             <input type="file" id="ws-image" accept="image/*">
          </div>
          <div class="input-group">
            <label>Veya Fotoğraf URL</label>
            <input type="text" id="ws-image-url">
          </div>
        </div>
        <button type="submit" class="btn-filled">Atölyeyi Kaydet</button>
        <div id="ws-message" class="message"></div>
      </form>
    </div>
    <div id="table-container">
      <p>Veriler yükleniyor...</p>
    </div>
  </div>

  <script type="module" src="./src/admin.js"></script>
</body>
</html>
